<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythic Mayhem: Prototype - Godframe</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Patrick+Hand+SC&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <meta name="description" content="Um protótipo de Mythic Mayhem, um beat 'em up evolutivo com mecânicas de absorção de habilidades e mudanças de era. Desenvolvido por Godframe.">
</head>
<body class="prehistoric">
    <div id="app-container">
        <!-- Camada de Fundo Dinâmica -->
        <div id="era-background" class="bg-prehistoric"></div>
        <div id="parallax-midground"></div>
        
        <canvas id="game-canvas"></canvas>

        <div id="ui-overlay">
            <!-- HUD Superior -->
            <header id="hud" class="hidden">
                <div class="hud-left glass-comic">
                    <div class="player-info">
                        <span class="era-label" id="current-era">IDADE PRÉ-HISTÓRICA</span>
                        <div class="health-container">
                            <div class="health-bar" id="p-hp"></div>
                        </div>
                    </div>
                </div>

                <div class="hud-center">
                    <div class="logo-container">
                        <h1 id="game-logo">MYTHIC <span class="highlight">MAYHEM</span></h1>
                    </div>
                </div>

                <div class="hud-right glass-comic">
                    <div class="skills-slots">
                        <span class="skill-label">ABSORBED SKILLS</span>
                        <div id="skill-icons" class="icons-row">
                            <div class="skill-slot empty" id="slot-1"></div>
                            <div class="skill-slot empty" id="slot-2"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Telas de Menu e Transições -->
            <main id="game-screens">
                <!-- Cinematic Splash Screen -->
                <section id="splash-screen" class="screen active">
                    <div class="crt-overlay"></div>
                    <div id="dev-intro" class="cinematic-text hidden">
                        <p class="present-tiny">A</p>
                        <h2 class="dev-name-movie">GODFRAME</h2>
                        <p class="present-tiny">PRODUCTION</p>
                    </div>
                    <div id="title-intro" class="cinematic-text hidden">
                        <h1 class="logo-movie glow-pulse">MYTHIC MAYHEM</h1>
                        <p class="skip-hint">CLIQUE PARA PULAR</p>
                    </div>
                </section>

                <section id="start-menu" class="screen hidden cuphead-menu">
                    <!-- Fundo Detalhado (Cenário de Guerra) -->
                    <div class="scenery-bg"></div>
                    
                    <div class="vintage-overlay"></div>

                    <!-- Esquerda: Botões Empilhados -->
                    <div class="menu-left-panel">
                        <h1 class="game-logo-cartoon-small">MYTHIC <br><span class="highlight-toon">MAYHEM</span></h1>
                        
                        <div class="button-stack">
                            <button id="play-btn" class="toon-btn-stack color-orange">START</button>
                            <button class="toon-btn-stack color-green">AJUDA & OPÇÕES</button>
                            <button class="toon-btn-stack color-purple">CONTEÚDO EXTRA</button>
                        </div>
                    </div>

                    <!-- Direita: Personagens Flutuantes/Posando -->
                    <div class="menu-right-panel">
                        <!-- Imagens com o fundo limpo -->
                        <div class="char-brawler spartan" style="background-image: url('assets/espartano_clean.png');"></div>
                        <div class="char-brawler cowboy" style="background-image: url('assets/cowboy_clean.png');"></div>
                        <div class="char-brawler modern" style="background-image: url('assets/soldado_clean.png');"></div>
                        <div class="char-brawler pharaoh" style="background-image: url('assets/farao_piramide.png');"></div>
                        <div class="char-brawler caveman" style="background-image: url('assets/cavernas_clean.png');"></div>
                    </div>
                </section>

                <section id="era-transition" class="screen hidden">
                    <div class="vortex"></div>
                    <h2 class="shifting-text">SALTO TEMPORAL EM CURSO...</h2>
                    <p id="next-era-name">GRÉCIA ANTIGA</p>
                </section>

                <section id="overworld-map" class="screen hidden">
                    <div class="map-container">
                        <div class="map-bg"></div>
                        <div class="map-path prehistoric-path"></div>
                        <div class="map-path medieval-path"></div>
                        <div class="map-path future-path"></div>
                        
                        <div class="world-node active" id="node-prehistoric" data-world="prehistoric">
                            <div class="world-icon">🌋</div>
                            <div class="world-label">PRÉ-HISTÓRIA</div>
                        </div>

                        <div class="world-node active" id="node-medieval" data-world="medieval">
                            <div class="world-icon">🏰</div>
                            <div class="world-label">IDADE MÉDIA</div>
                        </div>

                        <div class="world-node active" id="node-future" data-world="future">
                            <div class="world-icon">🚀</div>
                            <div class="world-label">FUTURO</div>
                        </div>

                        <div id="map-player" class="map-avatar"></div>
                    </div>
                </section>

                <section id="game-over" class="screen hidden">
                    <div class="glass-comic large">
                        <h2>TEMPO ESGOTADO</h2>
                        <button id="retry-btn" class="bangers-btn">TENTAR NOVAMENTE</button>
                    </div>
                </section>
            </main>

            <!-- Feedback de Jogabilidade -->
            <div id="popups"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
